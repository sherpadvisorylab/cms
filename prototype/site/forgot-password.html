<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot password – CMS Site</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="site-logo">CMS Site</a>
      <nav class="site-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main class="site-main">
    <div class="container" style="max-width: 400px; margin: 2rem auto;">
      <div class="card">
        <div class="card-header">Forgot password</div>
        <div class="card-body">
          <form id="forgotForm">
            <div class="form-group">
              <label>Email</label>
              <input type="email" class="form-control" name="email" required placeholder="Your email">
            </div>
            <button type="submit" class="btn btn-primary">Send reset link</button>
          </form>
          <p class="mt-2"><a href="login.html">Back to login</a></p>
        </div>
      </div>
    </div>
  </main>
  <footer class="site-footer">
    <div class="container"><p><a href="privacy-policy.html">Privacy</a> · <a href="terms.html">Terms</a></p></div>
  </footer>
  <script>document.getElementById('forgotForm').addEventListener('submit', function(e) { e.preventDefault(); alert('Reset link would be sent (no backend).'); });</script>
</body>
</html>
