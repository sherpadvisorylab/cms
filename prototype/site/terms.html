<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Terms &amp; Conditions – CMS Site</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="m-0 font-sans text-[15px] leading-normal text-gray-900 bg-gray-100">
  <header class="bg-white border-b border-gray-200 py-3">
    <div class="max-w-6xl mx-auto px-5 flex items-center justify-between">
      <a href="index.html" class="font-bold text-lg text-gray-900 no-underline" id="siteLogo">CMS Site</a>
      <nav>
        <ul class="m-0 p-0 list-none flex gap-6">
          <li><a href="index.html" class="text-gray-900 font-medium no-underline hover:text-blue-800">Home</a></li>
          <li><a href="privacy-policy.html" class="text-gray-900 font-medium no-underline hover:text-blue-800">Privacy</a></li>
          <li><a href="terms.html" class="text-gray-900 font-medium no-underline hover:text-blue-800">Terms</a></li>
          <li><a href="../admin/index.html" class="text-gray-900 font-medium no-underline hover:text-blue-800">Admin</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main class="min-h-[60vh] py-8">
    <div class="max-w-6xl mx-auto px-5">
      <div class="py-6">
        <h1 id="legalTitle" class="text-2xl font-semibold m-0 mb-4">Terms &amp; Conditions</h1>
        <div id="legalContent" class="prose max-w-none">
          <p>This is the default Terms &amp; Conditions page. Content can be configured in Admin → CMS → Areas → [Area] → Legal tab.</p>
        </div>
      </div>
    </div>
  </main>
  <footer class="bg-white border-t border-gray-200 py-6 mt-8 text-gray-500 text-sm">
    <div class="max-w-6xl mx-auto px-5">
      <p class="m-0"><a href="privacy-policy.html" class="text-gray-500 no-underline hover:text-blue-800">Privacy Policy</a> · <a href="terms.html" class="text-gray-500 no-underline hover:text-blue-800">Terms &amp; Conditions</a> · <a href="login.html" class="text-gray-500 no-underline hover:text-blue-800">Login</a> · <a href="signup.html" class="text-gray-500 no-underline hover:text-blue-800">Sign up</a> · <a href="../admin/index.html" class="text-gray-500 no-underline hover:text-blue-800">Admin</a></p>
    </div>
  </footer>
  <script src="../assets/js/storage.js"></script>
  <script>
    seedIfEmpty();
    var areas = getAreas();
    var area = areas.find(function(a) { return a.name === 'Public'; }) || areas[0];
    if (area && area.legal && area.legal.pages && area.legal.pages.length) {
      var page = area.legal.pages.find(function(p) { return (p.path || '').indexOf('terms') !== -1; }) || area.legal.pages[area.legal.pages.length - 1];
      if (page) {
        if (document.getElementById('legalTitle')) document.getElementById('legalTitle').textContent = page.title || 'Terms & Conditions';
        if (document.getElementById('legalContent')) document.getElementById('legalContent').innerHTML = page.content || '<p>No content.</p>';
      }
    }
    if (document.getElementById('siteLogo') && area && area.siteName) document.getElementById('siteLogo').textContent = area.siteName;
  </script>
</body>
</html>
