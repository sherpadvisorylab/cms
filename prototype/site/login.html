<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login – CMS Site</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="m-0 font-sans text-[15px] leading-normal text-gray-900 bg-gray-100">
  <header class="bg-white border-b border-gray-200 py-3">
    <div class="max-w-6xl mx-auto px-5 flex items-center justify-between">
      <a href="index.html" class="font-bold text-lg text-gray-900 no-underline site-logo">CMS Site</a>
      <nav>
        <ul class="m-0 p-0 list-none flex gap-6">
          <li><a href="index.html" class="text-gray-900 font-medium no-underline hover:text-blue-800">Home</a></li>
          <li><a href="login.html" class="text-gray-900 font-medium no-underline hover:text-blue-800">Login</a></li>
          <li><a href="signup.html" class="text-gray-900 font-medium no-underline hover:text-blue-800">Sign up</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main class="min-h-[60vh] py-8">
    <div class="max-w-md mx-auto px-5 py-8">
      <div class="bg-white rounded-md shadow border border-gray-200 overflow-hidden">
        <div class="px-5 py-4 border-b border-gray-200 font-semibold">Login</div>
        <div class="p-5">
          <form id="loginForm">
            <div class="mb-4">
              <label class="block mb-1 font-medium">Email</label>
              <input type="email" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" name="email" required>
            </div>
            <div class="mb-4">
              <label class="block mb-1 font-medium">Password</label>
              <input type="password" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" name="password" required>
            </div>
            <p class="mb-4"><a href="forgot-password.html" class="text-blue-800 hover:underline">Forgot password?</a></p>
            <button type="submit" class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-md border border-blue-800 bg-blue-800 text-white hover:bg-blue-900 cursor-pointer">Sign in</button>
          </form>
        </div>
      </div>
    </div>
  </main>
  <footer class="bg-white border-t border-gray-200 py-6 mt-8 text-gray-500 text-sm">
    <div class="max-w-6xl mx-auto px-5">
      <p class="m-0"><a href="privacy-policy.html" class="text-gray-500 no-underline hover:text-blue-800">Privacy Policy</a> · <a href="terms.html" class="text-gray-500 no-underline hover:text-blue-800">Terms</a> · <a href="login.html" class="text-gray-500 no-underline hover:text-blue-800">Login</a> · <a href="signup.html" class="text-gray-500 no-underline hover:text-blue-800">Sign up</a> · <a href="../admin/index.html" class="text-gray-500 no-underline hover:text-blue-800">Admin</a></p>
    </div>
  </footer>
  <script src="../assets/js/storage.js"></script>
  <script>
    seedIfEmpty();
    var areas = getAreas();
    var area = areas.find(function(a) { return a.name === 'Public'; }) || areas[0];
    var logoEl = document.querySelector('.site-header .site-logo');
    if (logoEl && area && area.siteName) logoEl.textContent = area.siteName;
  </script>
  <script>document.getElementById('loginForm').addEventListener('submit', function(e) { e.preventDefault(); alert('Login UI only (no backend).'); });</script>
</body>
</html>
