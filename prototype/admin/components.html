<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Components – CMS Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="m-0 font-sans text-[15px] leading-normal text-gray-900 bg-gray-100">
  <div class="flex min-h-screen">
    <aside class="w-60 flex-shrink-0 bg-gray-900 text-gray-200 py-4">
      <div class="px-5 pb-4 font-bold text-base border-b border-gray-700 mb-2">CMS Admin</div>
      <nav>
        <a href="index.html" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">Dashboard</a>
        <a href="areas.html" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">Areas</a>
        <a href="pages.html" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">Pages</a>
        <a href="navigation.html" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">Navigation</a>
        <a href="components.html" class="block py-2 px-5 text-sm bg-gray-800 text-white border-l-4 border-blue-500 no-underline">Components</a>
        <a href="templates.html" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">Templates</a>
        <a href="forms.html" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">Forms</a>
        <a href="emails.html" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">Emails</a>
        <a href="users.html" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">Users</a>
        <a href="settings.html" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">Settings</a>
        <a href="../site/index.html" target="_blank" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">View site</a>
      </nav>
    </aside>
    <main class="flex-1 p-6 overflow-x-auto">
      <div class="mb-6">
        <h1 class="m-0 mb-1 text-2xl font-semibold">CMS Components</h1>
        <p class="m-0 text-gray-500 text-sm">Page, UI, and Navigation components. Variables in templates appear in Attributes.</p>
      </div>
      <div class="bg-white rounded-md shadow border border-gray-200 overflow-hidden mb-4">
        <div class="px-5 py-4 border-b border-gray-200 font-semibold flex items-center justify-between flex-wrap gap-2">
          <div class="flex gap-0 border-b border-gray-200 -mb-px" id="typeTabs">
            <a href="#" data-type="page" class="px-4 py-2.5 text-gray-500 font-semibold text-blue-800 border-b-2 border-blue-800 mb-[-1px] no-underline">Page components</a>
            <a href="#" data-type="ui" class="px-4 py-2.5 text-gray-500 hover:text-blue-800 no-underline">UI components</a>
            <a href="#" data-type="navigation" class="px-4 py-2.5 text-gray-500 hover:text-blue-800 no-underline">Navigation components</a>
          </div>
          <a href="component_edit.html?id=new&name=Component" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-md border border-blue-800 bg-blue-800 text-white hover:bg-blue-900 no-underline">Add component</a>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-[180px_1fr] gap-6">
        <div class="bg-white rounded-md shadow border border-gray-200 overflow-hidden">
          <div class="px-5 py-4 border-b border-gray-200 font-semibold">Categories</div>
          <div class="p-5">
            <ul class="list-none m-0 p-0" id="catList"></ul>
          </div>
        </div>
        <div class="bg-white rounded-md shadow border border-gray-200 overflow-hidden">
          <div class="p-5">
            <div class="grid grid-cols-[repeat(auto-fill,minmax(200px,1fr))] gap-4" id="compGrid"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../assets/js/storage.js"></script>
  <script>
    (function() {
      seedIfEmpty();
      var CATEGORIES = {
        page: ['Hero', 'Content block', 'Features', 'Testimonials', 'CTA', 'Team', 'Pricing', 'FAQ', 'Contact', 'Footer', 'Gallery', 'Stats', 'Newsletter', 'Map'],
        ui: ['Container', 'Wrapper', 'Grid', 'Columns', 'Spacer', 'Divider', 'Layout block', 'Fixed block', 'Decorative'],
        navigation: ['Header', 'Navbar', 'Breadcrumb', 'Sidebar', 'Sidebar nav', 'Footer nav', 'Tabs', 'Pagination', 'Menu', 'Mega menu', 'Mobile menu']
      };
      var currentType = 'page';
      var currentCategory = '';

      function seedComponents() {
        var ids = getAllComponentIds();
        if (ids.indexOf('hero-1') === -1) {
          setJson('pmp_component_hero-1', { id: 'hero-1', name: 'Hero', type: 'page', category: 'Hero', description: '', html: '<section><h1>{{ headline }}</h1><p>{{ subheadline }}</p><a href="{{ cta_url }}">{{ cta_text }}</a></section>', css: '', js: '', variables: { headline: { type: 'string', label: 'Headline' }, subheadline: { type: 'string', label: 'Subheadline' }, cta_url: { type: 'url', label: 'CTA URL' }, cta_text: { type: 'string', label: 'CTA Text' } }, variableOrder: ['headline', 'subheadline', 'cta_url', 'cta_text'], positioningStructure: [] });
        }
        if (ids.indexOf('content-1') === -1) {
          setJson('pmp_component_content-1', { id: 'content-1', name: 'Content block', type: 'page', category: 'Content block', description: '', html: '<div><h2>{{ title }}</h2><div>{{ description }}</div></div>', css: '', js: '', variables: { title: { type: 'string', label: 'Title' }, description: { type: 'textarea', label: 'Description' } }, variableOrder: ['title', 'description'], positioningStructure: [] });
        }
        if (ids.indexOf('cta-1') === -1) {
          setJson('pmp_component_cta-1', { id: 'cta-1', name: 'CTA Banner', type: 'page', category: 'CTA', description: '', html: '<section><h2>{{ title }}</h2><p>{{ message }}</p><a href="{{ link_url }}">{{ link_text }}</a></section>', css: '', js: '', variables: { title: { type: 'string', label: 'Title' }, message: { type: 'string', label: 'Message' }, link_url: { type: 'url', label: 'Link URL' }, link_text: { type: 'string', label: 'Link Text' } }, variableOrder: [], positioningStructure: [] });
        }
      }
      seedComponents();

      function getComponentsByType(type) {
        var ids = getAllComponentIds();
        return ids.map(function(id) {
          var c = getComponent(id);
          return c ? { id: c.id, name: c.name, type: c.type || 'page', category: c.category || '' } : null;
        }).filter(Boolean).filter(function(c) { return c.type === type; });
      }

      function loadCategories() {
        var cats = CATEGORIES[currentType] || [];
        var comps = getComponentsByType(currentType);
        var used = {};
        comps.forEach(function(c) { used[c.category] = true; });
        var el = document.getElementById('catList');
        var allCls = !currentCategory ? 'py-1.5 font-semibold text-blue-800 cursor-pointer' : 'py-1.5 text-gray-700 hover:text-blue-800 cursor-pointer';
        el.innerHTML = '<li class="' + allCls + '" data-cat="">All</li>' + cats.map(function(c) {
          var cls = currentCategory === c ? 'py-1.5 font-semibold text-blue-800 cursor-pointer' : 'py-1.5 text-gray-700 hover:text-blue-800 cursor-pointer';
          return '<li class="' + cls + '" data-cat="' + c + '">' + c + '</li>';
        }).join('');
      }

      function loadGrid() {
        var comps = getComponentsByType(currentType);
        if (currentCategory) comps = comps.filter(function(c) { return c.category === currentCategory; });
        function esc(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        var el = document.getElementById('compGrid');
        el.innerHTML = comps.map(function(c) {
          return '<div class="border border-gray-200 rounded-md p-4 cursor-pointer hover:border-blue-800 hover:bg-gray-50 comp-card" data-id="' + esc(c.id) + '"><div class="font-semibold">' + esc(c.name || c.id) + '</div><div class="text-sm text-gray-500">' + esc(c.category || '') + '</div></div>';
        }).join('');
      }

      function switchType(type) {
        currentType = type;
        currentCategory = '';
        document.querySelectorAll('#typeTabs a').forEach(function(a) {
          a.classList.remove('font-semibold', 'text-blue-800', 'border-b-2', 'border-blue-800', 'mb-[-1px]');
          a.classList.add('text-gray-500');
          if (a.getAttribute('data-type') === type) {
            a.classList.add('font-semibold', 'text-blue-800', 'border-b-2', 'border-blue-800', 'mb-[-1px]');
            a.classList.remove('text-gray-500');
          }
        });
        loadCategories();
        loadGrid();
      }

      document.getElementById('typeTabs').addEventListener('click', function(e) {
        var t = e.target.closest('a[data-type]');
        if (t) { e.preventDefault(); switchType(t.getAttribute('data-type')); }
      });
      document.getElementById('catList').addEventListener('click', function(e) {
        var li = e.target.closest('li[data-cat]');
        if (li) {
          currentCategory = li.getAttribute('data-cat') || '';
          document.querySelectorAll('#catList li').forEach(function(x) {
            x.classList.remove('font-semibold', 'text-blue-800');
            x.classList.add('text-gray-700', 'hover:text-blue-800');
          });
          li.classList.add('font-semibold', 'text-blue-800');
          li.classList.remove('text-gray-700');
          loadGrid();
        }
      });
      document.getElementById('compGrid').addEventListener('click', function(e) {
        var card = e.target.closest('.comp-card');
        if (card) location.href = 'component_edit.html?id=' + encodeURIComponent(card.getAttribute('data-id')) + '&name=' + encodeURIComponent(card.querySelector('.font-semibold').textContent);
      });

      loadCategories();
      loadGrid();
    })();
  </script>
</body>
</html>
