<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Emails – CMS Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="m-0 font-sans text-[15px] leading-normal text-gray-900 bg-gray-100">
  <div class="flex min-h-screen">
    <aside class="w-60 flex-shrink-0 bg-gray-900 text-gray-200 py-4">
      <div class="px-5 pb-4 font-bold text-base border-b border-gray-700 mb-2">CMS Admin</div>
      <nav>
        <a href="index.html" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">Dashboard</a>
        <a href="areas.html" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">Areas</a>
        <a href="pages.html" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">Pages</a>
        <a href="navigation.html" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">Navigation</a>
        <a href="components.html" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">Components</a>
        <a href="templates.html" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">Templates</a>
        <a href="forms.html" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">Forms</a>
        <a href="emails.html" class="block py-2 px-5 text-sm bg-gray-800 text-white border-l-4 border-blue-500 no-underline">Emails</a>
        <a href="users.html" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">Users</a>
        <a href="settings.html" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">Settings</a>
        <a href="../site/index.html" target="_blank" class="block py-2 px-5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white no-underline">View site</a>
      </nav>
    </aside>
    <main class="flex-1 p-6 overflow-x-auto">
      <div class="mb-6">
        <h1 class="m-0 mb-1 text-2xl font-semibold">Email templates</h1>
        <p class="m-0 text-gray-500 text-sm">Edit subject and message; variables use {{ variable_name }}. Sent via API (loadTemplates, send).</p>
      </div>
      <div class="bg-white rounded-md shadow border border-gray-200 overflow-hidden">
        <div class="px-5 py-4 border-b border-gray-200 font-semibold">Templates</div>
        <div class="p-5 overflow-x-auto">
          <table class="w-full border-collapse text-sm" id="emailTable">
            <thead>
              <tr>
                <th class="px-4 py-3 text-left border-b border-gray-200 font-semibold text-gray-500 bg-gray-50">ID</th>
                <th class="px-4 py-3 text-left border-b border-gray-200 font-semibold text-gray-500 bg-gray-50">Name</th>
                <th class="px-4 py-3 text-left border-b border-gray-200 font-semibold text-gray-500 bg-gray-50">Category</th>
                <th class="px-4 py-3 text-left border-b border-gray-200 font-semibold text-gray-500 bg-gray-50">Subject</th>
                <th class="px-4 py-3 text-left border-b border-gray-200 font-semibold text-gray-500 bg-gray-50">Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <div class="hidden fixed inset-0 bg-black/40 z-[1000] items-center justify-center overflow-y-auto p-4" id="modalEdit">
    <div class="bg-white rounded-md shadow-lg border border-gray-200 max-w-[640px] w-full max-h-[90vh] overflow-hidden flex flex-col">
      <div class="px-5 py-4 border-b border-gray-200 font-semibold flex items-center justify-between"><span id="modalEditTitle">Edit template</span><button type="button" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-md border border-gray-200 bg-white text-gray-900 hover:bg-gray-100 cursor-pointer" id="modalEditClose">×</button></div>
      <div class="p-5 overflow-y-auto flex-1">
        <div class="mb-4">
          <label class="block mb-1 font-medium">Subject</label>
          <input type="text" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" id="emailSubject" placeholder="Subject line">
        </div>
        <div class="mb-4">
          <label class="block mb-1 font-medium">Message (variables: {{ variable_name }})</label>
          <textarea class="w-full px-3 py-2 text-sm border border-gray-200 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 min-h-[80px] resize-y" id="emailMessage" rows="10" placeholder="Body content"></textarea>
        </div>
        <div class="mb-4">
          <label class="block mb-1 font-medium">Variables (comma-separated)</label>
          <input type="text" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" id="emailVars" placeholder="user_name, program_name, link">
        </div>
      </div>
      <div class="p-5 border-t border-gray-200 flex justify-end gap-2">
        <button type="button" class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-md border border-gray-200 bg-white text-gray-900 hover:bg-gray-100 cursor-pointer" id="modalEditCancel">Cancel</button>
        <button type="button" class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-md border border-blue-800 bg-blue-800 text-white hover:bg-blue-900 cursor-pointer" id="modalEditSave">Save</button>
        <button type="button" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-md border border-gray-200 bg-white text-gray-900 hover:bg-gray-100 cursor-pointer" id="modalEditReset">Reset to default</button>
      </div>
    </div>
  </div>
  <script src="../assets/js/storage.js"></script>
  <script>
    (function() {
      seedIfEmpty();
      var KEY = 'pmp_cms_email_templates';
      var editId = null;
      var DEFAULT_TEMPLATES = {
        user_activation: { id: 'user_activation', name: 'User Activation', category: 'auth', subject: 'Activate Your Account', message: 'Dear {{user_name}},\n\nClick to activate: {{activation_link}}\n\nExpires: {{expiration_time}}', variables: ['user_name', 'activation_link', 'expiration_time'] },
        password_reset: { id: 'password_reset', name: 'Password Reset', category: 'auth', subject: 'Reset Your Password', message: 'Dear {{user_name}},\n\nReset link: {{reset_link}}\n\nExpires: {{expiration_time}}', variables: ['user_name', 'reset_link', 'expiration_time'] },
        welcome_email: { id: 'welcome_email', name: 'Welcome Email', category: 'auth', subject: 'Welcome to {{app_name}}', message: 'Hello {{user_name}},\n\nLogin: {{login_link}}\nDashboard: {{dashboard_link}}', variables: ['user_name', 'login_link', 'dashboard_link', 'app_name'] },
        user_invitation: { id: 'user_invitation', name: 'User Invitation', category: 'auth', subject: "You've been invited to join {{program_name}}", message: 'Hello {{user_name}},\n\nInviter: {{inviter_name}}\nLink: {{invitation_link}}\nProgram: {{program_name}}\nStartup: {{startup_name}}', variables: ['user_name', 'inviter_name', 'invitation_link', 'program_name', 'startup_name'] }
      };

      function getTemplates() {
        var t = getJson(KEY, null);
        if (t && typeof t === 'object') return t;
        setJson(KEY, DEFAULT_TEMPLATES);
        return DEFAULT_TEMPLATES;
      }

      function loadTable() {
        var t = getTemplates();
        var list = Object.keys(t).map(function(id) { var x = t[id]; return { id: id, name: x.name, category: x.category, subject: x.subject }; });
        function esc(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        document.querySelector('#emailTable tbody').innerHTML = list.map(function(x) {
          return '<tr class="hover:bg-gray-50"><td class="px-4 py-3 text-left border-b border-gray-200"><code class="bg-gray-100 px-1 rounded">' + esc(x.id) + '</code></td><td class="px-4 py-3 text-left border-b border-gray-200">' + esc(x.name || '') + '</td><td class="px-4 py-3 text-left border-b border-gray-200">' + esc(x.category || '') + '</td><td class="px-4 py-3 text-left border-b border-gray-200">' + esc((x.subject || '').substring(0, 50)) + '</td><td class="px-4 py-3 text-left border-b border-gray-200"><button type="button" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-md border border-gray-200 bg-white text-gray-900 hover:bg-gray-100 cursor-pointer btn-edit-email" data-id="' + esc(x.id) + '">Edit</button></td></tr>';
        }).join('');
      }

      function openEdit(id) {
        editId = id;
        var t = getTemplates();
        var x = t[id];
        if (!x) return;
        document.getElementById('modalEditTitle').textContent = 'Edit: ' + (x.name || id);
        document.getElementById('emailSubject').value = x.subject || '';
        document.getElementById('emailMessage').value = x.message || '';
        document.getElementById('emailVars').value = Array.isArray(x.variables) ? x.variables.join(', ') : (x.variables || '');
        document.getElementById('modalEdit').classList.remove('hidden');
        document.getElementById('modalEdit').classList.add('flex');
      }

      function saveEdit() {
        if (!editId) return;
        var t = getTemplates();
        var x = t[editId];
        if (!x) return;
        x.subject = document.getElementById('emailSubject').value;
        x.message = document.getElementById('emailMessage').value;
        x.variables = document.getElementById('emailVars').value.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
        t[editId] = x;
        setJson(KEY, t);
        loadTable();
        document.getElementById('modalEdit').classList.add('hidden');
        document.getElementById('modalEdit').classList.remove('flex');
      }

      function resetEdit() {
        if (!editId || !DEFAULT_TEMPLATES[editId]) return;
        var def = DEFAULT_TEMPLATES[editId];
        document.getElementById('emailSubject').value = def.subject || '';
        document.getElementById('emailMessage').value = def.message || '';
        document.getElementById('emailVars').value = (def.variables || []).join(', ');
      }

      document.getElementById('modalEditClose').onclick = function() { document.getElementById('modalEdit').classList.add('hidden'); document.getElementById('modalEdit').classList.remove('flex'); };
      document.getElementById('modalEditCancel').onclick = function() { document.getElementById('modalEdit').classList.add('hidden'); document.getElementById('modalEdit').classList.remove('flex'); };
      document.getElementById('modalEditSave').onclick = saveEdit;
      document.getElementById('modalEditReset').onclick = resetEdit;
      document.querySelector('#emailTable tbody').addEventListener('click', function(e) {
        var btn = e.target.closest('button[data-id]');
        if (btn && btn.classList.contains('btn-edit-email')) openEdit(btn.getAttribute('data-id'));
      });
      loadTable();
    })();
  </script>
</body>
</html>
